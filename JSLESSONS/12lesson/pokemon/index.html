<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Поиск страны</h1>

        <div class="search-box">
            <input 
                type="text" 
                id="countryInput" 
                placeholder="Введите страну, например Kazakhstan"
            >
            <button id="searchBtn">Найти</button>
        </div>

        <div id="countryBlock" class="country-block"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
