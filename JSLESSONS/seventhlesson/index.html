<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Dashboard</h1>

        <div class="task-input">
            <input type="text" placeholder="Введите задачу...">
            <button>Добавить</button>
        </div>

        <div class="messages">
            <p class="success">Задача успешно добавлена</p>
            <p class="error">Ошибка: пустое поле</p>
        </div>

        <ul class="task-list">
            <li>
                <span>Сделать домашку</span>
                <button class="delete">✕</button>
            </li>
            <li>
                <span>Пойти в зал</span>
                <button class="delete">✕</button>
            </li>
            <li>
                <span>Выучить JavaScript</span>
                <button class="delete">✕</button>
            </li>
        </ul>
    </div>

</body>
</html>
