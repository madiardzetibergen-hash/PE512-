<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="todo-card">
      <h1>To-do List</h1>
      <p class="subtitle">Планируй задачи просто и удобно</p>

      <div class="input-group">
        <input type="text" id="input" placeholder="Введите задачу" />
        <button id="addTaskBtn">Добавить</button>
      </div>

      <ul id="tasksList"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
